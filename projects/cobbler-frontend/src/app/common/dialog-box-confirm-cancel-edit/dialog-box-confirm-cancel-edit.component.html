<h1 mat-dialog-title i18n="@@dialog.cancel-edit.title">Cancel Edit?</h1>
<div mat-dialog-content class="content">
  <p i18n="@@dialog.cancel-edit.content">
    Are you sure you want to cancel the edit for the item &quot;{{
      data.name
    }}&quot;? All changes will be lost!
  </p>
</div>
<div mat-dialog-actions>
  <button mat-button [mat-dialog-close]="true" i18n="@@button.yes">Yes</button>
  <button mat-button [mat-dialog-close]="false" i18n="@@button.no">No</button>
</div>
