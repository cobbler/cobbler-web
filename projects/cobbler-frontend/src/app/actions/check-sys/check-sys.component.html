<div class="right-column" id="dataScreen">
  <router-outlet></router-outlet>
  <div class="CheckSys-div">
    <div class="title-table">
      <div class="title-row">
        <h1 class="title title-cell-text" i18n="@@action.check.title">CHECK</h1>
        <span class="title-cell-button">
          <button mat-icon-button (click)="this.updateChecks()">
            <mat-icon>refresh</mat-icon>
          </button>
        </span>
      </div>
    </div>
    <div class="list-group">
      @if (isLoading) {
        <mat-spinner style="margin: 0 auto"></mat-spinner>
      }
      @if (!isLoading) {
        <mat-list>
          @for (element of this.data | async; track element) {
            <mat-list-item>{{ element }}</mat-list-item>
          }
        </mat-list>
      }
    </div>
  </div>
</div>
