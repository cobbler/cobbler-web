<h1 i18n="@@preferences.title">User Preferences</h1>

<mat-accordion multi="true">
  <mat-expansion-panel [expanded]="true">
    <mat-expansion-panel-header>
      <mat-panel-title i18n="@@preferences.user-info-title"
        >User Information</mat-panel-title
      >
    </mat-expansion-panel-header>
    <p i18n="@@preferences.user-info-not-available">
      User information is not retrievable with Cobbler 3.3.x.
    </p>
  </mat-expansion-panel>
  <mat-expansion-panel [expanded]="true">
    <mat-expansion-panel-header>
      <mat-panel-title i18n="@@preferences.user-prefs-title"
        >User Preferences</mat-panel-title
      >
    </mat-expansion-panel-header>
    <form class="preferences-form">
      <mat-slide-toggle
        class="pad-bottom"
        [disabled]="true"
        i18n="@@preferences.dark-mode"
        >Dark Mode</mat-slide-toggle
      >
      <mat-form-field class="full-width">
        <mat-label i18n="@@preferences.language-label">Language</mat-label>
        <mat-select
          [value]="currentLocale"
          (selectionChange)="onLanguageChange($event.value)"
        >
          <mat-option value="en-US" i18n="@@preferences.language-english"
            >English</mat-option
          >
          <mat-option value="de" i18n="@@preferences.language-german"
            >German</mat-option
          >
        </mat-select>
      </mat-form-field>
      <mat-form-field class="full-width">
        <mat-label i18n="@@preferences.date-format-label"
          >Date Format</mat-label
        >
        <!-- TODO: Switch to autocomplete once more then one format is supported -->
        <input matInput value="DD/MM/YYYY" readonly />
      </mat-form-field>
      <mat-form-field class="full-width">
        <mat-label i18n="@@preferences.number-format-label"
          >Number Format (floating point separator)</mat-label
        >
        <mat-select value="comma" [disabled]="true">
          <mat-option value="comma" i18n="@@preferences.number-format-comma"
            >Comma</mat-option
          >
          <mat-option value="dot" i18n="@@preferences.number-format-dot"
            >Dot</mat-option
          >
        </mat-select>
      </mat-form-field>
    </form>
  </mat-expansion-panel>
</mat-accordion>
