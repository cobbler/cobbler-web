<h1 mat-dialog-title i18n="@@template.create.title">Create Template</h1>
<div mat-dialog-content>
  <form [formGroup]="templateCreateFormGroup">
    <mat-form-field>
      <mat-label i18n="@@template.create.field.name">Name</mat-label>
      <input
        matInput
        required
        cdkFocusInitial
        type="text"
        formControlName="name"
      />
    </mat-form-field>
    <mat-form-field class="form-field-full-width">
      <mat-label i18n="@@template.create.field.content"
        >Template Content</mat-label
      >
      <textarea matInput formControlName="content"></textarea>
    </mat-form-field>
  </form>
  <div mat-dialog-actions>
    <button
      mat-button
      (click)="createTemplate()"
      i18n="@@template.create.save-button"
    >
      Save Template
    </button>
    <button mat-button [mat-dialog-close]="false" i18n="@@button.cancel">
      Cancel
    </button>
  </div>
</div>
