<div class="title-table">
  <div class="title-row">
    <h1 class="title title-cell-text" i18n="@@menu.overview.title">MENUS</h1>
    <span class="title-cell-button">
      <button
        mat-icon-button
        (click)="this.addMenu()"
        matTooltip="Add Menu"
        i18n-matTooltip="@@menu.overview.add-tooltip"
      >
        <mat-icon>add</mat-icon>
      </button></span
    >
  </div>
</div>
<mat-form-field appearance="fill">
  <mat-label i18n="@@filter.label">Filter</mat-label>
  <input
    matInput
    (keyup)="applyFilter($event)"
    placeholder="Ex. cobbler_register"
    i18n-placeholder="@@menu.overview.filter-placeholder"
    #input
  />
</mat-form-field>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>
  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef i18n="@@table.col.name">Name</th>
    <td mat-cell *matCellDef="let element">
      <a (click)="showMenu(element.uid, element.name)"
        >{{ element.name }}
        <mat-icon class="link-icon" aria-hidden="true"
          >arrow_outward</mat-icon
        ></a
      >
    </td>
  </ng-container>

  <!-- Display Name Column -->
  <ng-container matColumnDef="display_name">
    <th
      mat-header-cell
      *matHeaderCellDef
      i18n="@@menu.overview.col.display-name"
    >
      Display Name
    </th>
    <td mat-cell *matCellDef="let element">{{ element.display_name }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let element">
      <button mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="showMenu(element.uid, element.name)">
          <mat-icon>visibility</mat-icon>
          <span i18n="@@item.action.show-details">Show details</span>
        </button>
        <button mat-menu-item (click)="renameMenu(element.uid, element.name)">
          <mat-icon>edit</mat-icon>
          <span i18n="@@item.action.rename">Rename</span>
        </button>
        <button mat-menu-item (click)="deleteMenu(element.uid, element.name)">
          <mat-icon>delete</mat-icon>
          <span i18n="@@item.action.delete">Delete</span>
        </button>
      </mat-menu>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
<mat-paginator
  [length]="100"
  [pageSize]="10"
  [pageSizeOptions]="[5, 10, 25, 100]"
  aria-label="Select page"
  i18n-aria-label="@@paginator.select-page"
>
</mat-paginator>
