        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install deps
        run: npm install
      - name: Lint XMLRPC Typescript Library
        run: npm run lint typescript-xmlrpc
  lint-lib-api:
