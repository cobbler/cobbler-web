server {
    listen       8080;
    server_name  localhost;
    root /usr/share/nginx/html;

    # Runtime config — served from webroot root regardless of active locale
    location = /app-config.json {
        try_files $uri =404;
    }

    # Auto-redirect bare root to best-matching locale
    location = / {
        set $lang "en-US";
        if ($http_accept_language ~* "^de") { set $lang "de"; }
        return 302 /$lang/;
    }

    location /en-US/ {
        alias /usr/share/nginx/html/en-US/;
        try_files $uri $uri/ /en-US/index.html;
    }

    location /de/ {
        alias /usr/share/nginx/html/de/;
        try_files $uri $uri/ /de/index.html;
    }

    # Redirect unmatched paths to default locale
    location / {
        return 302 /en-US$request_uri;
    }
}
